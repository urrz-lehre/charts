# Default values for moodle.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  # -- Moodle image repository.
  repository: ghcr.io/moodlehq/moodle-php-apache
  # -- Moodle image pull policy.
  pullPolicy: IfNotPresent
  # -- Moodle image tag.
  tag: "8.4-bookworm"

# -- Names of secret required for pulling image.
imagePullSecrets: []

# -- String to partially override moodle.fullname.
nameOverride: ""
# -- String to fully override moodle.fullname.
fullnameOverride: ""

# This section builds out the service account, see [here](https://kubernetes.io/docs/concepts/security/service-accounts/).
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  name: ""

# -- Additional annotations for moodle pod
podAnnotations: {}
# -- Additional labels for moodle pod.
podLabels: {}

# -- SecurityContext for moodle pod.
podSecurityContext: {}

# -- SecurityContext for moodle containers.
securityContext: {}

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # -- Service type for moodle service, see [here](https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types).
  type: ClusterIP
  # -- Ports for moodle service, see [here](https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports).
  ports:
      # -- Name of first moodle service port.
    - name: http
      # -- Port within container that shall be used.
      containerPort: 80
      # -- Name of first moodle service port.
    - name: https
      # -- Port within container that shall be used.
      containerPort: 443

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  # -- Enables / Disables moodle ingress.
  enabled: false
  # -- ClassName for moodle ingress.
  className: ""
  # -- Additional annotations for moodle ingress.
  annotations: {}
  hosts:
    # -- Hostname for moodle ingress.
    - host: chart-example.local
      paths:
          # -- Path for moodle ingress.
        - path: /
          # -- PathType for moodle ingress.
          pathType: ImplementationSpecific
  # -- TLS configuration for moodle ingress.
  tls: []

# -- Resource allocations for moodle pod.
resources: {}

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    # -- Path to use for moodle pod LivenessProbe.
    path: /
    # -- Port to use for moodle pod LivenessProbe.
    port: http
readinessProbe:
  httpGet:
    # -- Port to use for moodle pod ReadinessProbe.
    path: /
    # -- Port to use for moodle pod LivenessProbe.
    port: http

autoscaling:
  # -- Enables/Disables Autoscaling.
  enabled: false
  # -- Minimum amount of replicas to spawn.
  minReplicas: 1
  # -- Maximum amount of replicas to spawn.
  maxReplicas: 100
  # -- Target CPU usage (in percent) the pod has to reach before spawning another one.
  targetCPUUtilizationPercentage: 80

# -- Additional volumes on the output Deployment definition.
volumes: []

# -- Additional volumeMounts on the output Deployment definition.
volumeMounts: []

# -- Specifies on which node this pod shall run.
nodeSelector: {}

# -- Specifies what kinds of taints are tolerable for this pod.
tolerations: []

# -- Specifies on which types of nodes this pod shall run.
affinity: {}

init:
  # -- Enables / Disables the init container.
  enabled: true

cron:
  # -- Enables / Disables the CronJob.
  enabled: true
  # -- Schedule for the CronJob.
  schedule: "*/5 * * * *"
  # -- Commands to run for CronJob.
  commands:
    - [
        "/usr/local/bin/php",
        "/var/www/html/admin/cli/cron.php",
        "--keep-alive=59",
      ]
    - [
        "/usr/local/bin/php",
        "/var/www/html/admin/cli/adhoc_task.php",
        "--execute",
        "--keep-alive=59",
      ]

persistence:
  # -- Enables / Disables persistence for Moodle.
  enabled: true
  # -- Size of Moodle PersistentVolumeClaim.
  size: 8Gi
  # -- AccessModes for Moodle PersistentVolumeClaim.
  accessModes:
    - ReadWriteOnce

# Variables pertaining to Dragonfly, see https://github.com/dragonflyoss/helm-charts/blob/main/charts/dragonfly/values.yaml
dragonfly:
  # -- Enables / Disables Dragonfly.
  enabled: true

  storage:
    # -- Enables / Disables persistence for Dragonfly.
    enabled: true
    # -- PersistentVolumeClaim size for Dragonfly.
    requests: 128Mi

  # -- Extra Parameters for Dragonfly.
  extraArgs:
    - --dbfilename=dump
    - --snapshot_cron=* * * * *

  # -- SecurityContext for Dragonfly pod.
  podSecurityContext: {}

  # -- SecurityContext for Dragonfly containers.
  securityContext: {}

# Variables pertaining to Postgres, see https://github.com/CloudPirates-io/helm-charts/tree/main/charts/postgres
postgres:
  # -- Enables/Disables Postgres pod.
  enabled: true
  
  image:
    # -- Postgres tag the database container shall use.
    tag: 17-alpine

  auth:
    # -- Username of the database root user.
    username: moodle
    # -- Name of the database that Postgres shall create.
    database: moodle

  persistence:
    # -- Enables/Disables persistence for Postgres.
    enabled: true
    # -- StorageClass for Postgres PersistentVolumeClaim.
    storageClassName: standard
    # -- AccessModes for Postgres PersistentVolumeClaim.
    accessModes:
      - ReadWriteOnce
