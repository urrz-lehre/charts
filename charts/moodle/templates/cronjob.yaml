{{- if .Values.cron.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "moodle.fullname" . }}
  labels:
    {{- include "moodle.labels" . | nindent 4 }}
spec:
  schedule: "{{ .Values.cron.schedule }}"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.podSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
          {{- range $index, $value := .Values.cron.commands }}
            - name: "{{ $.Chart.Name }}-cron-{{ $index }}"
              {{- with $.Values.securityContext }}
              securityContext:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag | default $.Chart.AppVersion }}"
              imagePullPolicy: {{ $.Values.image.pullPolicy }}
              {{- with . }}
              command:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              volumeMounts:
              {{- with $.Values.volumeMounts }}
                {{- toYaml . | nindent 12 }}
              {{- end }}
                - name: {{ include "moodle.fullname" $ }}
                  mountPath: "/var/www/html"
                  subPath: sys
                - name: {{ include "moodle.fullname" $ }}
                  mountPath: "/var/www/moodledata"
                  subPath: data
                - name: "{{ $.Chart.Name }}-tmp"
                  mountPath: "/tmp"
                  subPath: tmp
          {{- end }}
          volumes:
            {{- with .Values.volumes }}
            {{- toYaml . | nindent 8 }}
            {{- end }}
            - name: "{{ .Chart.Name }}-tmp"
              emptyDir: {}
            - name: {{ include "moodle.fullname" . }}
              {{- if .Values.persistence.enabled }}
              persistentVolumeClaim:
                claimName: {{ .Values.persistence.existingClaim | default (printf "%s" (include "moodle.fullname" .)) | quote }}
              {{- else }}
              emptyDir: {}
              {{- end }}

{{- end }}